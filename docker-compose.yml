version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:v1.12.0
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  cortex-backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - qdrant
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOGIN_TYPE=${LOGIN_TYPE:-mock}
      - DB_TYPE=${DB_TYPE:-sqlite}
      - DB_HOST=${DB_HOST:-localhost}
      - DB_PORT=${DB_PORT:-}
      - DB_NAME=${DB_NAME:-cortex}
      - DB_USER=${DB_USER:-cortex}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - DATABASE_URL=${DATABASE_URL:-sqlite:/app/data/cortex.db?mode=rwc}
      - QDRANT_GRPC_URL=http://qdrant:6334
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      - RERANKING_MODEL=${RERANKING_MODEL:-BAAI/bge-reranker-v2-m3}
      - KEYCLOAK_URL=${KEYCLOAK_URL:-http://keycloak:8080}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-cortex}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-cortex-backend}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET:-}
      - UPLOAD_DIR=/app/uploads

  cortex-frontend:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - cortex-backend

volumes:
  qdrant_data:
